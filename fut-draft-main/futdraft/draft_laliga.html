<html>

<head>
    <title>La Liga Draft Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="draft.css">
    <link rel="icon" href="Football_(soccer_ball).svg.png">
</head>

<body>
    <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="db.html">Database</a></li>

    </ul>
    <div class="draft-container">
        <h2>La Liga Draft Simulator</h2>

        <div id="draft-hud"
            style="display: none; justify-content: space-between; align-items: center; background: #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
            <div style="font-size: 20px; font-weight: bold;">Team Rating: <span id="team-rating">0</span></div>
            <button id="save-draft-btn" onclick="saveDraft()" style="display: none; background: #ea580c;">Save
                Draft</button>
        </div>

        <div id="pitch-container" style="display: flex;">
            <div class="pitch">
                <div id="players-container"></div>
            </div>
            <button onclick="resetDraft()" class="reset-btn" id="reset-btn" style="display: none;">Reset Draft</button>
        </div>

        <div id="saved-drafts-container" style="margin-top: 40px; border-top: 2px solid #ccc; padding-top: 20px;">
            <h3>Saved Drafts</h3>
            <div id="saved-drafts-list" class="formation-grid" style="margin-top: 15px;"></div>
        </div>

        <div id="start-screen" class="modal" style="display: flex;">
            <div class="modal-content">
                <h2>Choose a formation</h2>
                <br>
                <div class="formation-grid">
                    <div class="formation-card" onclick="selectFormation('442')">
                        <div class="mini-pitch"><span>4-4-2</span></div>
                    </div>
                    <div class="formation-card" onclick="selectFormation('433')">
                        <div class="mini-pitch"><span>4-3-3</span></div>
                    </div>
                    <div class="formation-card" onclick="selectFormation('352')">
                        <div class="mini-pitch"><span>3-5-2</span></div>
                    </div>
                    <div class="formation-card" onclick="selectFormation('4231')">
                        <div class="mini-pitch"><span>4-2-3-1</span></div>
                    </div>
                    <div class="formation-card" onclick="selectFormation('3412')">
                        <div class="mini-pitch"><span>3-4-1-2</span></div>
                    </div>
                    <div class="formation-card" onclick="selectFormation('442_2')">
                        <div class="mini-pitch"><span>4-4-2(2)</span></div>
                    </div>
                    <div class="formation-card" onclick="selectFormation('4141')">
                        <div class="mini-pitch"><span>4-1-4-1</span></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="player-modal" class="modal">
            <div class="modal-content" style="max-width: 800px;">
                <div class="modal-header">
                    <h2 id="player-modal-title">Select Player</h2>
                    <span class="close-btn" onclick="closePlayerModal()">&times;</span>
                </div>
                <div class="player-options-grid" id="player-options-grid"
                    style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 20px;">
                </div>
            </div>
        </div>
    </div>

    <script src="draft.js"></script>
</body>

</html>
